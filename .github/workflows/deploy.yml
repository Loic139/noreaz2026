name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -ex
            whoami
            ls -la /srv/
            ls -la /srv/customer/ || echo "ERREUR: /srv/customer inaccessible"
            touch /tmp/test_write && echo "OK: /tmp accessible"
            touch /srv/customer/test_write && echo "OK: /srv/customer accessible" || echo "ERREUR: pas d ecriture dans /srv/customer"
