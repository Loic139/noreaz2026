name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          password:    ${{ secrets.SSH_PASS }}
          port:        ${{ secrets.SSH_PORT }}
          request_pty: true
          script: |
            set -ex
            curl -fSL https://github.com/Loic139/noreaz2026/archive/refs/heads/main.tar.gz -o /tmp/deploy.tar.gz
            tar xzf /tmp/deploy.tar.gz --strip-components=1 -C /srv/customer/sites/noreaz2026.digitme.fun
            rm /tmp/deploy.tar.gz
            npm install --production --prefix /srv/customer/sites/noreaz2026.digitme.fun
