name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer sshpass
        run: sudo apt-get install -y sshpass

      - name: Créer l'archive
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./.github' \
            .

      - name: Transférer l'archive via SSH (cat)
        run: |
          sshpass -p "${{ secrets.SSH_PASS }}" ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/deploy.tar.gz" < /tmp/deploy.tar.gz

      - name: Extraire et déployer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -ex
            tar xzf /tmp/deploy.tar.gz --strip-components=1 -C /srv/customer
            rm /tmp/deploy.tar.gz
            npm install --production --prefix /srv/customer
            pm2 restart noreaz2026 || pm2 start app.js --name noreaz2026 --cwd /srv/customer
