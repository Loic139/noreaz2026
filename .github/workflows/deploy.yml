name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer sshpass
        run: sudo apt-get install -y sshpass

      - name: Créer l'archive
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./.github' \
            .

      - name: Transférer l'archive via SSH (cat)
        run: |
          sshpass -p "${{ secrets.SSH_PASS }}" ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/deploy.tar.gz" < /tmp/deploy.tar.gz

      - name: Extraire et déployer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -ex
            ls -lh /tmp/deploy.tar.gz
            file /tmp/deploy.tar.gz || true
            tar tzf /tmp/deploy.tar.gz | head -10 || echo "ERREUR: tar list failed"
            mkdir -p /tmp/test_extract
            tar xzf /tmp/deploy.tar.gz --strip-components=1 -C /tmp/test_extract || echo "ERREUR: tar extract to /tmp failed"
            ls /tmp/test_extract/ | head -5 || true
