name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -ex
            cd /srv/customer
            curl -fSL https://github.com/Loic139/noreaz2026/archive/refs/heads/main.tar.gz | tar xz --strip-components=1
            npm install --production --prefix /srv/customer
            pm2 restart noreaz2026 || pm2 start app.js --name noreaz2026 --cwd /srv/customer
