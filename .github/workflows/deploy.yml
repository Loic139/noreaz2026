name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer sshpass
        run: sudo apt-get install -y sshpass

      - name: Créer l'archive
        run: |
          tar cf /tmp/deploy.tar \
            --exclude='./node_modules' \
            --exclude='./.git' \
            --exclude='./.github' \
            .

      - name: Transférer, extraire et installer
        run: |
          sshpass -p "${{ secrets.SSH_PASS }}" ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/deploy.tar \
              && tar xf /tmp/deploy.tar --strip-components=1 -C /srv/customer/sites/noreaz2026.digitme.fun \
              && rm /tmp/deploy.tar \
              && npm install --production --prefix /srv/customer/sites/noreaz2026.digitme.fun" \
            < /tmp/deploy.tar
